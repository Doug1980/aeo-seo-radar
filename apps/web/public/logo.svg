<svg width="200" height="120" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AEO &amp; SEO Radar logo</title>
  <desc>Logo com ícone de radar e texto AEO &amp; SEO Radar</desc>

  <defs>
    <clipPath id="clip-radar">
      <circle cx="340" cy="140" r="90"/>
    </clipPath>
  </defs>

  <!-- Radar circles -->
  <circle cx="340" cy="140" r="90" fill="none" stroke="#1e40af" stroke-width="1.5" opacity="0.4"/>
  <circle cx="340" cy="140" r="65" fill="none" stroke="#1e40af" stroke-width="1.5" opacity="0.5"/>
  <circle cx="340" cy="140" r="40" fill="none" stroke="#1e40af" stroke-width="1.5" opacity="0.6"/>
  <circle cx="340" cy="140" r="16" fill="#1e40af" opacity="0.8"/>
  <circle cx="340" cy="140" r="6" fill="#60a5fa"/>

  <!-- Radar sweep lines -->
  <line x1="340" y1="140" x2="340" y2="50" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="140" x2="430" y2="140" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="140" x2="276" y2="76" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <line x1="340" y1="140" x2="404" y2="76" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>

  <!-- Radar sweep arm -->
  <line x1="340" y1="140" x2="406" y2="73" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

  <!-- Blip dot -->
  <circle cx="390" cy="95" r="5" fill="#60a5fa" opacity="0.9"/>
  <circle cx="390" cy="95" r="9" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>

  <!-- Blip dot 2 -->
  <circle cx="358" cy="108" r="3.5" fill="#93c5fd" opacity="0.7"/>

  <!-- Text -->
  <text x="340" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9" letter-spacing="1">AEO &amp; SEO Radar</text>
  <text x="340" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="2">PRESENÇA DIGITAL</text>
</svg>
