name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    # Sobe um Postgres real para os testes de integração rodarem contra ele
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      PAGESPEED_API_KEY: test-key
      GROQ_API_KEY: test-key
      AUTH_API_SECRET: test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Compila o pacote compartilhado (gera dist/index.d.ts e index.js),
      # do qual a API depende para type check e testes.
      - name: Build shared package
        run: npm run build --workspace=@aeo-seo-radar/shared

      # Aplica as migrations versionadas no Postgres de teste (cria a tabela audits + enum)
      - name: Run database migrations
        run: npm run db:migrate
        working-directory: apps/api

      - name: Type check
        run: npm run lint
        working-directory: apps/api

      - name: Run tests
        run: npm run test
        working-directory: apps/api