services:
  postgres:
    image: postgres:17-alpine
    container_name: aeo-radar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: radar
      POSTGRES_DB: aeo_seo_radar
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U radar -d aeo_seo_radar' ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
